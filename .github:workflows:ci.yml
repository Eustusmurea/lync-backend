backend-tests:
  runs-on: ubuntu-latest

  services:
    postgres:
      image: postgres:16-alpine
      env:
        POSTGRES_DB: lyncare
        POSTGRES_USER: lyncare
        POSTGRES_PASSWORD: lyncare
      ports:
        - 5432:5432
      options: >-
        --health-cmd "pg_isready -U lyncare"
        --health-interval 5s
        --health-timeout 5s
        --health-retries 5

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - run: pip install -r requirements.txt

    - run: python manage.py test
      env:
        SECRET_KEY: test-secret
        DEBUG: "False"
        DB_ENGINE: postgresql
        DB_NAME: lyncare
        DB_USER: lyncare
        DB_PASSWORD: lyncare
        DB_HOST: localhost
        DB_PORT: "5432"